name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-musl
            os: ubuntu-latest
            bin: zlrd
            archive: zlrd-x86_64-linux.tar.gz

          - target: x86_64-windows-gnu
            os: ubuntu-latest
            bin: zlrd.exe
            archive: zlrd-x86_64-windows.zip

          - target: x86_64-macos
            os: macos-latest
            bin: zlrd
            archive: zlrd-x86_64-macos.tar.gz

          - target: aarch64-macos
            os: macos-latest
            bin: zlrd
            archive: zlrd-aarch64-macos.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build
        run: |
          zig build \
            -Doptimize=ReleaseFast \
            -Dtarget=${{ matrix.target }} \
            -Dversion="${{ github.ref_name }}"

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp zig-out/bin/zlrd.exe dist/zlrd.exe
            cd dist && zip ${{ matrix.archive }} zlrd.exe
          else
            cp zig-out/bin/zlrd dist/zlrd
            cd dist && tar czf ${{ matrix.archive }} zlrd
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build .deb package
        run: |
          VERSION="${{ github.ref_name }}"
          VER="${VERSION#v}"

          tar xzf dist/zlrd-x86_64-linux.tar.gz -C dist

          mkdir -p pkg/DEBIAN pkg/usr/local/bin
          cp dist/zlrd pkg/usr/local/bin/zlrd
          chmod 755 pkg/usr/local/bin/zlrd

          echo "Package: zlrd"                                      > pkg/DEBIAN/control
          echo "Version: ${VER}"                                   >> pkg/DEBIAN/control
          echo "Architecture: amd64"                               >> pkg/DEBIAN/control
          echo "Maintainer: alaleks <alaleksandrov30@gmail.com>"   >> pkg/DEBIAN/control
          echo "Section: utils"                                    >> pkg/DEBIAN/control
          echo "Priority: optional"                                >> pkg/DEBIAN/control
          echo "Homepage: https://github.com/alaleks/zlrd"        >> pkg/DEBIAN/control
          echo "Description: Fast log viewer CLI"                  >> pkg/DEBIAN/control
          echo " High-performance log reader and analyzer."        >> pkg/DEBIAN/control

          dpkg-deb --build pkg dist/zlrd_${VER}_amd64.deb

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz *.zip *.deb > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skip pre-releases (v1.0.0-beta, v1.0.0-rc1, etc.)
    if: ${{ !contains(github.ref_name, '-') }}
    # Don't fail the release if the tap update fails (e.g. token not configured yet)
    continue-on-error: true
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: "zlrd-*-macos.tar.gz"

      - name: Update formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "TAP_GITHUB_TOKEN not configured — skipping Homebrew tap update"
            exit 0
          fi

          VERSION="${{ github.ref_name }}"
          VER="${VERSION#v}"
          BASE="https://github.com/alaleks/zlrd/releases/download/${VERSION}"

          SHA_ARM=$(sha256sum dist/zlrd-aarch64-macos.tar.gz | awk '{print $1}')
          SHA_X86=$(sha256sum dist/zlrd-x86_64-macos.tar.gz  | awk '{print $1}')

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/alaleks/homebrew-tap.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/zlrd.rb << EOF
          class Zlrd < Formula
            desc "Fast log viewer: tail/grep alternative with filtering and coloring"
            homepage "https://github.com/alaleks/zlrd"
            version "${VER}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/zlrd-aarch64-macos.tar.gz"
                sha256 "${SHA_ARM}"
              end
              on_intel do
                url "${BASE}/zlrd-x86_64-macos.tar.gz"
                sha256 "${SHA_X86}"
              end
            end

            def install
              bin.install "zlrd"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/zlrd --version")
            end
          end
          EOF

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zlrd.rb
          git diff --staged --quiet || git commit -m "chore: bump zlrd to ${VERSION}"
          git push

  publish-apt:
    name: Publish apt package (Buildkite Package Registries)
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    continue-on-error: true
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: zlrd-x86_64-linux.tar.gz
          path: incoming

      - name: Build .deb
        run: |
          VERSION="${{ github.ref_name }}"
          VER="${VERSION#v}"

          tar xzf incoming/zlrd-x86_64-linux.tar.gz -C incoming

          mkdir -p pkg/DEBIAN pkg/usr/local/bin
          cp incoming/zlrd pkg/usr/local/bin/zlrd
          chmod 755 pkg/usr/local/bin/zlrd

          echo "Package: zlrd"                                      > pkg/DEBIAN/control
          echo "Version: ${VER}"                                   >> pkg/DEBIAN/control
          echo "Architecture: amd64"                               >> pkg/DEBIAN/control
          echo "Maintainer: alaleks <alaleksandrov30@gmail.com>"   >> pkg/DEBIAN/control
          echo "Section: utils"                                    >> pkg/DEBIAN/control
          echo "Priority: optional"                                >> pkg/DEBIAN/control
          echo "Homepage: https://github.com/alaleks/zlrd"        >> pkg/DEBIAN/control
          echo "Description: Fast log viewer CLI"                  >> pkg/DEBIAN/control
          echo " High-performance log reader and analyzer."        >> pkg/DEBIAN/control

          dpkg-deb --build pkg zlrd_${VER}_amd64.deb
          echo "DEB=zlrd_${VER}_amd64.deb" >> "$GITHUB_ENV"

      - name: Push to Buildkite Package Registries
        env:
          BUILDKITE_REGISTRY_TOKEN: ${{ secrets.BUILDKITE_REGISTRY_TOKEN }}
        run: |
          if [ -z "${BUILDKITE_REGISTRY_TOKEN}" ]; then
            echo "BUILDKITE_REGISTRY_TOKEN not configured — skipping apt publish"
            exit 0
          fi

          # Buildkite Package Registries API:
          #   POST https://packages.buildkite.com/<org>/<registry>/packages/upload
          # Bearer token must be a Registry Token with upload permission.
          HTTP_CODE=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${BUILDKITE_REGISTRY_TOKEN}" \
            -F "file=@${DEB}" \
            "https://packages.buildkite.com/aleksandr-aleksandrov/zlrd/packages/upload")

          echo "HTTP ${HTTP_CODE}"
          cat response.txt
          echo

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            exit 1
          fi
