name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-musl
            os: ubuntu-latest
            bin: zlrd
            archive: zlrd-x86_64-linux.tar.gz

          - target: x86_64-windows-gnu
            os: ubuntu-latest
            bin: zlrd.exe
            archive: zlrd-x86_64-windows.zip

          - target: x86_64-macos
            os: macos-latest
            bin: zlrd
            archive: zlrd-x86_64-macos.tar.gz

          - target: aarch64-macos
            os: macos-latest
            bin: zlrd
            archive: zlrd-aarch64-macos.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build
        run: |
          zig build \
            -Doptimize=ReleaseFast \
            -Dtarget=${{ matrix.target }} \
            -Dversion="${{ github.ref_name }}"

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp zig-out/bin/zlrd.exe dist/zlrd.exe
            cd dist && zip ${{ matrix.archive }} zlrd.exe
          else
            cp zig-out/bin/zlrd dist/zlrd
            cd dist && tar czf ${{ matrix.archive }} zlrd
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skip pre-releases (v1.0.0-beta, v1.0.0-rc1, etc.)
    if: ${{ !contains(github.ref_name, '-') }}
    # Don't fail the release if the tap update fails (e.g. token not configured yet)
    continue-on-error: true
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: "zlrd-*-macos.tar.gz"

      - name: Update formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "TAP_GITHUB_TOKEN not configured — skipping Homebrew tap update"
            exit 0
          fi

          VERSION="${{ github.ref_name }}"
          VER="${VERSION#v}"
          BASE="https://github.com/alaleks/zlrd/releases/download/${VERSION}"

          SHA_ARM=$(sha256sum dist/zlrd-aarch64-macos.tar.gz | awk '{print $1}')
          SHA_X86=$(sha256sum dist/zlrd-x86_64-macos.tar.gz  | awk '{print $1}')

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/alaleks/homebrew-tap.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/zlrd.rb << EOF
          class Zlrd < Formula
            desc "Fast log viewer: tail/grep alternative with filtering and coloring"
            homepage "https://github.com/alaleks/zlrd"
            version "${VER}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/zlrd-aarch64-macos.tar.gz"
                sha256 "${SHA_ARM}"
              end
              on_intel do
                url "${BASE}/zlrd-x86_64-macos.tar.gz"
                sha256 "${SHA_X86}"
              end
            end

            def install
              bin.install "zlrd"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/zlrd --version")
            end
          end
          EOF

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zlrd.rb
          git diff --staged --quiet || git commit -m "chore: bump zlrd to ${VERSION}"
          git push
