name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-musl
            os: ubuntu-latest
            bin: zlrd
            artifact: zlrd-x86_64-linux

          - target: x86_64-windows-gnu
            os: ubuntu-latest
            bin: zlrd.exe
            artifact: zlrd-x86_64-windows

          - target: x86_64-macos
            os: macos-latest
            bin: zlrd
            artifact: zlrd-x86_64-macos

          - target: aarch64-macos
            os: macos-latest
            bin: zlrd
            artifact: zlrd-aarch64-macos

    steps:
      - uses: actions/checkout@v4

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build
        run: |
          zig build \
            -Doptimize=ReleaseFast \
            -Dtarget=${{ matrix.target }} \
            -Dversion="${{ github.ref_name }}"

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp zig-out/bin/${{ matrix.bin }} dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
